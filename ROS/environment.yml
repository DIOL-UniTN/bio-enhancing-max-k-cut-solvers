name: ros-maxcut
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  # PyTorch and related (CPU version for macOS)
  - pytorch=2.2.2
  - torchvision
  - torchaudio
  # Core scientific computing
  - numpy<2.0
  - scipy>=1.10.0
  - networkx=2.8
  - scikit-learn>=1.3.0
  - joblib>=1.3.0
  # Utilities
  - tqdm>=4.65.0
  - pyyaml>=6.0
  - requests>=2.31.0
  - matplotlib>=3.7.0
  # Install via pip (not available or better from pip)
  - pip:
    - torch-geometric
    - torch-scatter
    - torch-sparse
    - torch-cluster
    - cvxpy>=1.5.0
    - cvxopt>=1.3.0
    - clarabel>=0.8.0
    - ecos>=2.0.0
    - osqp>=0.6.0
    - qdldl>=0.1.7
    - scs>=3.2.0
